<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>
    <form action="">
        <label for="">First Name:</label>
        <input type="text" name="firstname">
        <label for="">Last Name:</label>
        <input type="text" name="lastname"><br><br>
        <label for="">Date of birth:</label>
        <input type="date" name="dateofbirth">
        <label for="">Age:</label>
        <input type="number" name="Age"><br><br>
        <label for="">Gender:</label>
        <select name="gender" id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <label for="">Email Address:</label>
        <input type="email" placeholder="Enter email address"><br><br>
        <label for="">Positions Available:</label>
        <input type="radio" name="Positions Available">Junior Developer
        <input type="radio" name="Positions Available">Mid-level Developer
        <input type="radio" name="Positions Available">Senior Developer<br><br>
        <label for="">Programming Languages:</label>
        <input type="checkbox" name="Programming Languages">Java
        <input type="checkbox" name="Programming Languages">JavaScript
        <input type="checkbox" name="Programming Languages">Python<br><br>
        <label for="">Password:</label>
        <input type="password" name="password">
        <label for="">Confirm Password:</label>
        <input type="password" name="confirm password"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">


    </form>
</body>
</html>
